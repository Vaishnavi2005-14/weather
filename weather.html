<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1eb;
    --surface: #ede9e0;
    --border: #d6d0c4;
    --ink: #1c1a16;
    --muted: #8a8478;
    --accent: #2d4a3e;
    --accent-light: #e8f0ec;
    --red: #c0392b;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 400px;
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    text-align: center;
  }

  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .search-box input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 13px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--accent); }

  .search-box button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 13px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .search-box button:hover { opacity: 0.85; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
  }

  .city-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .city-name {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.1;
  }

  .country {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
  }

  .condition-badge {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .temp-big {
    font-family: 'Fraunces', serif;
    font-size: 80px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .temp-unit {
    font-size: 28px;
    vertical-align: super;
    font-weight: 300;
  }

  .feels-like {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 20px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .stat {
    background: var(--surface);
    padding: 16px 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .error {
    background: #fdf0ef;
    border: 1px solid #e8c4c0;
    border-radius: 6px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-align: center;
  }

  .loading {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 32px;
  }

  #result { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="wordmark">Weather</div>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="City name" onkeydown="if(event.key==='Enter') getWeather()">
    <button onclick="getWeather()">Search</button>
  </div>

  <div id="result"></div>
</div>

<script>
  const API_KEY = 'd422855cfcff04403c39ef90205dfdbd';

  function getConditionLabel(code) {
    if (code >= 200 && code < 300) return 'Thunderstorm';
    if (code >= 300 && code < 400) return 'Drizzle';
    if (code >= 500 && code < 600) return 'Rain';
    if (code >= 600 && code < 700) return 'Snow';
    if (code >= 700 && code < 800) return 'Haze';
    if (code === 800) return 'Clear Sky';
    if (code === 801) return 'Few Clouds';
    if (code <= 804) return 'Overcast';
    return 'Variable';
  }

  async function getWeather() {
    const city = document.getElementById('cityInput').value.trim();
    const result = document.getElementById('result');
    if (!city) return;

    result.style.display = 'block';
    result.innerHTML = '<div class="loading">Fetching data</div>';

    if (API_KEY === 'd422855cfcff04403c39ef90205dfdbd') {
      result.innerHTML = `
        <div class="card">
          <div class="city-row">
            <div>
              <div class="city-name">Demo City</div>
              <div class="country">IN</div>
            </div>
            <div class="condition-badge">Partly Cloudy</div>
          </div>
          <div class="temp-big">28<span class="temp-unit">C</span></div>
          <div class="feels-like">Feels like 31 C</div>
          <div class="divider"></div>
          <div class="stats">
            <div class="stat"><div class="stat-val">72%</div><div class="stat-lbl">Humidity</div></div>
            <div class="stat"><div class="stat-val">12 km/h</div><div class="stat-lbl">Wind</div></div>
            <div class="stat"><div class="stat-val">8 km</div><div class="stat-lbl">Visibility</div></div>
          </div>
          <div class="error" style="margin-top:16px; font-size:11px; letter-spacing:0.05em;">Demo mode — add your API key from openweathermap.org</div>
        </div>`;
      return;
    }

    try {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
      );
      const data = await res.json();

      if (data.cod !== 200) {
        result.innerHTML = `<div class="error">City not found. Please try again.</div>`;
        return;
      }

      const label = getConditionLabel(data.weather[0].id);
      const temp = Math.round(data.main.temp);
      const feels = Math.round(data.main.feels_like);
      const wind = Math.round(data.wind.speed * 3.6);
      const vis = Math.round(data.visibility / 1000);

      result.innerHTML = `
        <div class="card">
          <div class="city-row">
            <div>
              <div class="city-name">${data.name}</div>
              <div class="country">${data.sys.country}</div>
            </div>
            <div class="condition-badge">${label}</div>
          </div>
          <div class="temp-big">${temp}<span class="temp-unit">C</span></div>
          <div class="feels-like">Feels like ${feels} C</div>
          <div class="divider"></div>
          <div class="stats">
            <div class="stat"><div class="stat-val">${data.main.humidity}%</div><div class="stat-lbl">Humidity</div></div>
            <div class="stat"><div class="stat-val">${wind} km/h</div><div class="stat-lbl">Wind</div></div>
            <div class="stat"><div class="stat-val">${vis} km</div><div class="stat-lbl">Visibility</div></div>
          </div>
        </div>`;
    } catch (e) {
      result.innerHTML = `<div class="error">Something went wrong. Check your connection.</div>`;
    }
  }
</script>
</body>
</html>
