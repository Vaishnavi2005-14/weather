<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f1eb;
  --surface: #ede9e0;
  --border: #d6d0c4;
  --ink: #1c1a16;
  --muted: #8a8478;
  --accent: #2d4a3e;
  --accent-light: #e8f0ec;
  --red: #c0392b;
}

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

.wordmark {
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 3px;
  color: var(--muted);
}

.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
}

.search-box button {
  padding: 12px;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.city-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.city-name {
  font-size: 24px;
}

.country {
  font-size: 12px;
  color: var(--muted);
}

.temp-big {
  font-size: 60px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  margin-top: 15px;
}

.stat {
  text-align: center;
}

.error {
  color: red;
  text-align: center;
}

.loading {
  text-align: center;
}

#result { display: none; }

</style>
</head>

<body>

<div class="container">

  <div class="wordmark">WEATHER</div>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city"
      onkeydown="if(event.key==='Enter') getWeather()">
    <button onclick="getWeather()">Search</button>
  </div>

  <div id="result"></div>

</div>

<script>

const API_KEY = "d422855cfcff04403c39ef90205dfdbd"; 

function getConditionLabel(code) {
  if (code >= 200 && code < 300) return 'Thunderstorm';
  if (code >= 300 && code < 400) return 'Drizzle';
  if (code >= 500 && code < 600) return 'Rain';
  if (code >= 600 && code < 700) return 'Snow';
  if (code >= 700 && code < 800) return 'Haze';
  if (code === 800) return 'Clear';
  return 'Cloudy';
}

async function getWeather() {

  const city = document.getElementById("cityInput").value.trim();
  const result = document.getElementById("result");

  if (!city) return;

  result.style.display = "block";
  result.innerHTML = '<div class="loading">Loading...</div>';

  try {

    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
    );

    const data = await response.json();

    if (data.cod !== 200) {
      result.innerHTML = `<div class="error">City not found</div>`;
      return;
    }

    const label = getConditionLabel(data.weather[0].id);

    result.innerHTML = `
      <div class="card">
        <div class="city-row">
          <div>
            <div class="city-name">${data.name}</div>
            <div class="country">${data.sys.country}</div>
          </div>
          <div>${label}</div>
        </div>

        <div class="temp-big">${Math.round(data.main.temp)}°C</div>
        <div>Feels like ${Math.round(data.main.feels_like)}°C</div>

        <div class="stats">
          <div class="stat">
            <div>${data.main.humidity}%</div>
            <div>Humidity</div>
          </div>
          <div class="stat">
            <div>${Math.round(data.wind.speed * 3.6)} km/h</div>
            <div>Wind</div>
          </div>
          <div class="stat">
            <div>${Math.round(data.visibility / 1000)} km</div>
            <div>Visibility</div>
          </div>
        </div>
      </div>
    `;

  } catch (error) {
    result.innerHTML = `<div class="error">Error fetching data</div>`;
  }
}

</script>

</body>
</html>
